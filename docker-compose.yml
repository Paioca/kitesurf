services:
  db:
    image: postgres:16-alpine
    container_name: kite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kite
      POSTGRES_PASSWORD: kite
      POSTGRES_DB: kite
    ports:
      - "5432:5432"
    volumes:
      - kite-pgdata:/var/lib/postgresql/data

volumes:
  kite-pgdata:
